<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Flores | Azory 2026</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #263238;
      background: #f2f7f5;
    }

    header {
      padding: 45px 20px;
      color: white;
      text-align: center;
      background: linear-gradient(135deg, #087f6d, #42a58f);
    }

    header h1 {
      margin: 0 0 8px;
      font-size: clamp(2.3rem, 7vw, 4rem);
    }

    header p {
      margin: 0;
      font-size: 1.15rem;
    }

    main {
      width: min(1400px, calc(100% - 28px));
      margin: 25px auto;
    }

    .card {
      margin-bottom: 22px;
      padding: 22px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .card h2 {
      margin-top: 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .gallery-button {
      display: block;
      padding: 0;
      overflow: hidden;
      border: 0;
      border-radius: 14px;
      background: #dce9e5;
      cursor: pointer;
    }

    .gallery img {
      display: block;
      width: 100%;
      height: 260px;
      object-fit: cover;
      transition: transform 0.2s ease;
    }

    .gallery-button:hover img {
      transform: scale(1.025);
    }

    .status {
      grid-column: 1 / -1;
      padding: 30px 10px;
      text-align: center;
      color: #607d8b;
    }

    .back {
      color: #087f6d;
      font-weight: bold;
      text-decoration: none;
    }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.93);
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 95vw;
      max-height: 90vh;
      object-fit: contain;
    }

    .close {
      position: fixed;
      top: 12px;
      right: 18px;
      padding: 8px 14px;
      border: 0;
      color: white;
      background: transparent;
      font-size: 2.2rem;
      cursor: pointer;
    }

    @media (max-width: 650px) {
      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .gallery img {
        height: 175px;
      }

      .card {
        padding: 16px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Flores</h1>
    <p>Azory 2026 · ostrov vodopádů</p>
  </header>

  <main>
    <section class="card">
      <h2>Den na Flores</h2>

      <p>
        Vodopády, mlha, zelené útesy a nejkrásnější ostrov Azor.
      </p>

      <p>
        Text později doplním z tabletu.
      </p>
    </section>

    <section class="card">
      <h2>Fotogalerie <span id="photo-count"></span></h2>

      <div id="gallery" class="gallery">
        <p class="status">Načítám fotografie…</p>
      </div>
    </section>

    <section class="card">
      <a class="back" href="azory-2026.html">
        ← Zpět na Azory 2026
      </a>
    </section>
  </main>

  <div
    id="lightbox"
    class="lightbox"
    role="dialog"
    aria-modal="true"
    aria-label="Zvětšená fotografie"
  >
    <button
      id="close-lightbox"
      class="close"
      type="button"
      aria-label="Zavřít fotografii"
    >
      ×
    </button>

    <img id="lightbox-image" alt="">
  </div>

  <script>
    const galleryEndpoint =
      'https://photos.d-a-g.name/azory2026/flores/gallery.php';

    const imageBaseUrl =
      'https://photos.d-a-g.name/azory2026/flores/';

    const gallery = document.getElementById('gallery');
    const photoCount = document.getElementById('photo-count');
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightbox-image');
    const closeLightboxButton =
      document.getElementById('close-lightbox');

    function openLightbox(imageUrl, altText) {
      lightboxImage.src = imageUrl;
      lightboxImage.alt = altText;
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      lightboxImage.src = '';
      document.body.style.overflow = '';
    }

    async function loadGallery() {
      try {
        const response = await fetch(galleryEndpoint, {
          cache: 'no-store'
        });

        if (!response.ok) {
          throw new Error(`HTTP chyba ${response.status}`);
        }

        const data = await response.json();

        if (!Array.isArray(data.images)) {
          throw new Error('Neplatný formát odpovědi galerie.');
        }

        if (data.images.length === 0) {
          gallery.innerHTML =
            '<p class="status">V galerii zatím nejsou žádné fotografie.</p>';
          return;
        }

        photoCount.textContent = `(${data.images.length})`;
        gallery.innerHTML = '';

        data.images.forEach((image) => {
          const imageUrl =
            imageBaseUrl + encodeURIComponent(image.file);

          const altText =
            image.alt || 'Flores – Azory 2026';

          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'gallery-button';
          button.setAttribute(
            'aria-label',
            `Otevřít fotografii ${image.file}`
          );

          const img = document.createElement('img');
          img.src = imageUrl;
          img.alt = altText;
          img.loading = 'lazy';
          img.decoding = 'async';

          button.addEventListener('click', () => {
            openLightbox(imageUrl, altText);
          });

          button.appendChild(img);
          gallery.appendChild(button);
        });
      } catch (error) {
        console.error('Galerii se nepodařilo načíst:', error);

        gallery.innerHTML = `
          <p class="status">
            Fotografie se nepodařilo načíst.
            Zkus stránku znovu načíst.
          </p>
        `;
      }
    }

    closeLightboxButton.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', (event) => {
      if (
        event.target === lightbox ||
        event.target === lightboxImage
      ) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeLightbox();
      }
    });

    loadGallery();
  </script>

</body>
</html>
